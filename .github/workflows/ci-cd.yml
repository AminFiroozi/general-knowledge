name: CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches:
      - 'ops/**'

env:
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE: ${{ secrets.FRONTEND_REGISTRY_IMAGE }}

jobs:
  test:
    name: Build & Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-fund --no-audit

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/ops/'))
    steps:
      - uses: actions/checkout@v4

      - name: Write env file
        run: echo "${{ secrets.ENV_LOCAL }}" > .env.local

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build Docker image
        env:
          FRONTEND_REGISTRY_IMAGE: ${{ env.IMAGE }}
        run: docker compose build

      - name: Push Docker image
        env:
          FRONTEND_REGISTRY_IMAGE: ${{ env.IMAGE }}
        run: docker compose push

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/ops/'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy docker-compose
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /root/frontend"
          scp -i ~/.ssh/id_rsa docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/frontend/

      - name: Deploy
        env:
          FRONTEND_REGISTRY_IMAGE: ${{ env.IMAGE }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd /root/frontend
            echo '${{ secrets.REGISTRY_PASSWORD }}' | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
            echo '${{ secrets.ENV_LOCAL }}' > .env.local
            chmod 644 .env.local
            export FRONTEND_REGISTRY_IMAGE=${{ env.IMAGE }}
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
            docker image prune -f
          "
