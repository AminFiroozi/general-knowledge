.notification_template:
    variables:
        COMMIT_SHA_SHORT: "${CI_COMMIT_SHORT_SHA}"
        BRANCH: "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}${CI_COMMIT_BRANCH}"
    before_script:
        - |
            CLEAN_AUTHOR=$(echo "${CI_COMMIT_AUTHOR}" | cut -d'<' -f1 | xargs)

            COMMIT_INFO="*🌿 Branch:* ${BRANCH}
            *👤 Author:* ${CLEAN_AUTHOR}
            *📦 Commit:* ${COMMIT_SHA_SHORT}"

            send_notification() {
              local MESSAGE=$1

              # Bale notification
              if [ -n "${BALE_BOT_TOKEN}" ]; then
                curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                  -d "chat_id=${BALE_CHAT_ID}" \
                  --data-urlencode "text=${MESSAGE}" \
                  -d "parse_mode=MarkdownV2" \
                  -d "disable_web_page_preview=true" > /dev/null 2>&1
              fi

              # Telegram notification
              if [ -n "${TELEGRAM_BOT_TOKEN}" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -d "chat_id=${TELEGRAM_CHAT_ID}" \
                  -d "message_thread_id=${TELEGRAM_BUILD_THREAD_ID}" \
                  --data-urlencode "text=${MESSAGE}" \
                  -d "parse_mode=MarkdownV2" \
                  -d "disable_web_page_preview=true" > /dev/null 2>&1
              fi
            }
            export -f send_notification
